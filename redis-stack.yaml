# redis-stack.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-redis
  namespace: ai-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm-redis
  template:
    metadata:
      labels:
        app: litellm-redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine  
          ports:
            - containerPort: 6379
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits: { memory: "128Mi", cpu: "100m" }
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-redis
  namespace: ai-system
spec:
  selector:
    app: litellm-redis
  ports:
    - port: 6379
