apiVersion: "cilium.io/v2alpha1"
kind: CiliumLoadBalancerIPPool
metadata:
  name: kind-l2-pool
spec:
  blocks:
  - cidr: "172.18.255.0/24" # 這是發給 LoadBalancer 用的 VIP 網段
---
apiVersion: "cilium.io/v2alpha1"
kind: CiliumL2AnnouncementPolicy
metadata:
  name: l2-announce-policy
spec:
  nodeSelector:
    matchExpressions:
      - key: kubernetes.io/os
        operator: In
        values:
          - linux
  interfaces:
    - eth0
  loadBalancerIPs: true
