  namespace: default
  labels:
    security.policy/type: ip-blocking
    security.policy/created-by: security-manager
spec:
  endpointSelector: {}
  ingress:
    - 
      fromCIDRSet:
        - 
          cidr: 192.168.1.100/32
        - 
          cidr: 10.0.0.50/32
      toPorts: []


