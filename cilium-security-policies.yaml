apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: strict-isolation-company-a
  namespace: tenant-company-a
  labels:
    security.policy/type: tenant-isolation
    security.policy/tenant: company-a
    security.policy/created-by: security-manager
spec:
  endpointSelector:
    matchLabels:
      tenant: company-a
  ingress:
    - 
      fromEndpoints:
        - 
          matchLabels:
            app: litellm-gateway
            k8s:io.kubernetes.pod.namespace: ai-system
      toPorts:
        - 
          ports:
            - 
              port: "11434"
              protocol: TCP
    - 
      fromEndpoints:
        - 
          matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - 
          ports:
            - 
              port: "9400"
              protocol: TCP
  egress:
    - 
      toEndpoints:
        - 
          matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - 
          ports:
            - 
              port: "53"
              protocol: ANY
    - 
      toEndpoints:
        - 
          matchLabels:
            app: litellm-gateway
            k8s:io.kubernetes.pod.namespace: ai-system
      toPorts:
        - 
          ports:
            - 
              port: "4000"
              protocol: TCP
    - 
      toFQDNs:
        - 
          matchName: huggingface.co
        - 
          matchName: ollama.ai
        - 
          matchPattern: "*.huggingface.co"
      toPorts:
        - 
          ports:
            - 
              port: "443"
              protocol: TCP

---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: lateral-movement-prevention-company-a
  namespace: tenant-company-a
  labels:
    security.policy/type: lateral-movement-prevention
    security.policy/tenant: company-a
spec:
  endpointSelector:
    matchLabels:
      tenant: company-a
  egress:
    - 
      toEndpoints:
        - 
          matchExpressions:
            - 
              key: tenant
              operator: NotIn
              values:
                - company-a
                - system
      toPorts:
    - 
      toEndpoints:
        - 
          matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
          matchExpressions:
            - 
              key: k8s-app
              operator: NotIn
              values:
                - kube-dns
      toPorts:
    - 
      toCIDRSet:
        - 
          cidr: 10.96.0.1/32
      toPorts:

